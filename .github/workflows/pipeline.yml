name: MEKPL CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # TUGAS LU: Continuous Testing & Inspection
  build-test-inspect:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0  # Dibutuhkan oleh SonarCloud untuk analisis yang akurat

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Cache SonarCloud packages
      uses: actions/cache@v3
      with:
        path: ~/.sonar/cache
        key: ${{ runner.os }}-sonar
        restore-keys: ${{ runner.os }}-sonar

    - name: Cache Maven packages
      uses: actions/cache@v3
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2

    - name: Build, Test, and Analyze
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      # Perintah ini menjalankan compile, unit test, dan inspeksi SonarCloud sekaligus
      run: mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=Lkyfabian_mekpl-final-project

  # TUGAS PARTNER LU: Continuous Deployment/Delivery
  deploy:
    needs: build-test-inspect
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' # Hanya deploy jika di branch main
    steps:
    - name: Deploy Application
      run: |
        echo "Partner lu nulis script deployment-nya di sini nanti bro."